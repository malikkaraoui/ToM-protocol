global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  # Tom relay metrics endpoint (Prometheus exposition format)
  # IMPORTANT: garder des labels basse cardinalité uniquement.
  - job_name: tom-relay-metrics
    metrics_path: /metrics
    static_configs:
      - targets:
          - relay-eu-1.tom-protocol.org:9090
        labels:
          relay: relay-eu-1
          region: eu-west
      - targets:
          - relay-us-1.tom-protocol.org:9090
        labels:
          relay: relay-us-1
          region: us-east

  # Optionnel: santé discovery HTTP (JSON) via probe externe ou exporter dédié.
  # Laisser commenté tant qu’aucun blackbox exporter n’est déployé.
  # - job_name: relay-discovery-health
  #   metrics_path: /probe
  #   params:
  #     module: [http_2xx]
  #   static_configs:
  #     - targets:
  #         - https://discovery.tom-protocol.org/health
  #   relabel_configs:
  #     - source_labels: [__address__]
  #       target_label: __param_target
  #     - source_labels: [__param_target]
  #       target_label: instance
  #     - target_label: __address__
  #       replacement: blackbox-exporter:9115
